<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>A Tribute to the Greatest to Play This Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg:       #0a0908;
      --bg-deep:  #050403;
      --gold:     #c8a14a;
      --gold-soft:#d9b870;
      --gold-dim: #6a5326;
      --bone:     #e8dcc4;
      --text:     #cfc6b3;
      --muted:    #7a6f5d;
      --display:  "Cinzel", Georgia, serif;
      --body:     "EB Garamond", Georgia, serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--bone);
      font-family: var(--display);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      user-select: none;
    }

    /* ── ambient embers ── */
    .embers {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 2; overflow: hidden;
    }
    .embers span {
      position: absolute; bottom: -10px;
      width: 2px; height: 2px;
      background: var(--gold); border-radius: 50%; opacity: 0;
      box-shadow: 0 0 6px var(--gold), 0 0 12px var(--gold-soft);
      animation: rise 14s linear infinite;
    }
    .embers span:nth-child(1)  { left: 8%;  animation-delay: 0s;   animation-duration: 16s; }
    .embers span:nth-child(2)  { left: 20%; animation-delay: 3s;   animation-duration: 19s; }
    .embers span:nth-child(3)  { left: 35%; animation-delay: 6s;   animation-duration: 14s; }
    .embers span:nth-child(4)  { left: 50%; animation-delay: 1s;   animation-duration: 22s; }
    .embers span:nth-child(5)  { left: 65%; animation-delay: 8s;   animation-duration: 17s; }
    .embers span:nth-child(6)  { left: 80%; animation-delay: 4s;   animation-duration: 20s; }
    .embers span:nth-child(7)  { left: 92%; animation-delay: 9s;   animation-duration: 15s; }
    @keyframes rise {
      0%   { transform: translateY(0) translateX(0);         opacity: 0; }
      10%  { opacity: 0.9; }
      50%  { transform: translateY(-50vh) translateX(20px); }
      90%  { opacity: 0.5; }
      100% { transform: translateY(-105vh) translateX(-20px); opacity: 0; }
    }

    /* ── vignette ── */
    .vignette {
      position: fixed; inset: 0; z-index: 3; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.75) 100%);
    }

    /* ── intro title card ── */
    #intro {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--bg-deep);
      cursor: pointer;
      transition: opacity 1.2s ease;
    }
    #intro.fade-out { opacity: 0; pointer-events: none; }

    .intro-eyebrow {
      font-size: 11px; letter-spacing: 0.55em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 32px;
      animation: fadein 1.5s ease-out 0.3s backwards;
    }
    .intro-title {
      font-size: clamp(28px, 5vw, 64px);
      font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; text-align: center;
      line-height: 1.2; padding: 0 24px;
      background: linear-gradient(180deg, var(--gold-soft) 0%, var(--gold) 50%, var(--gold-dim) 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fadein 1.8s ease-out 0.8s backwards;
    }
    .intro-sub {
      font-family: var(--body); font-style: italic;
      font-size: clamp(14px, 1.8vw, 20px);
      color: var(--text); letter-spacing: 0.12em;
      margin-top: 28px;
      animation: fadein 1.8s ease-out 1.4s backwards;
    }
    .intro-cta {
      font-size: 10px; letter-spacing: 0.4em;
      text-transform: uppercase; color: var(--gold-dim);
      margin-top: 56px;
      animation: blink-slow 2s ease-in-out 2.5s infinite backwards;
    }
    @keyframes fadein {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes blink-slow {
      0%, 100% { opacity: 0.3; } 50% { opacity: 1; }
    }

    /* ── slideshow ── */
    #slideshow {
      position: fixed; inset: 0; z-index: 1;
    }

    .slide {
      position: absolute; inset: 0;
      opacity: 0; transition: opacity 1.4s ease;
      overflow: hidden;
    }
    .slide.active { opacity: 1; }
    .slide.active .slide-img { animation: ken-burns 8s ease-in-out forwards; }

    .slide-img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
      display: block;
      filter: grayscale(0.15) contrast(1.05) brightness(0.82);
      transform-origin: center center;
    }

    /* alternate Ken Burns directions for variety */
    .slide:nth-child(odd)  .slide-img { transform-origin: 60% 40%; }
    .slide:nth-child(even) .slide-img { transform-origin: 40% 60%; }

    @keyframes ken-burns {
      from { transform: scale(1); }
      to   { transform: scale(1.08); }
    }

    /* dark gradient overlay at bottom for caption legibility */
    .slide::after {
      content: "";
      position: absolute; bottom: 0; left: 0; right: 0; height: 50%;
      background: linear-gradient(to bottom, transparent, rgba(5,4,3,0.92));
      pointer-events: none;
    }

    /* ── captions ── */
    .slide-caption {
      position: absolute; bottom: 0; left: 0; right: 0;
      z-index: 4; text-align: center;
      padding: 0 32px 64px;
      pointer-events: none;
      opacity: 0; transform: translateY(10px);
      transition: opacity 0.8s ease 0.6s, transform 0.8s ease 0.6s;
    }
    .slide.active .slide-caption {
      opacity: 1; transform: translateY(0);
    }
    .caption-name {
      font-size: clamp(28px, 5vw, 64px);
      font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase;
      background: linear-gradient(180deg, var(--gold-soft) 0%, var(--gold) 60%, var(--gold-dim) 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 10px;
    }
    .caption-line {
      font-family: var(--body); font-style: italic;
      font-size: clamp(16px, 2.2vw, 26px);
      color: var(--text); letter-spacing: 0.08em;
    }

    /* ── progress dots ── */
    #dots {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%);
      z-index: 5; display: flex; gap: 10px;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--gold-dim);
      transition: background 0.4s, transform 0.4s;
      cursor: pointer;
    }
    .dot.active { background: var(--gold); transform: scale(1.4); }

    /* ── nav arrows ── */
    .arrow {
      position: fixed; top: 50%; z-index: 5;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--gold-dim); font-size: 28px;
      cursor: pointer; padding: 16px;
      transition: color 0.3s; line-height: 1;
    }
    .arrow:hover { color: var(--gold); }
    .arrow-prev { left: 12px; }
    .arrow-next { right: 12px; }

    /* ── music button ── */
    .music-btn {
      position: fixed; bottom: 28px; left: 28px;
      z-index: 20; width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(5,4,3,0.88);
      border: 1px solid var(--gold-dim);
      color: var(--muted); font-size: 16px;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: border-color 0.3s, color 0.3s, box-shadow 0.3s;
    }
    .music-btn:hover { border-color: var(--gold); color: var(--gold); }
    .music-btn.playing {
      border-color: var(--gold); color: var(--gold);
      animation: music-pulse 2s ease-in-out infinite;
    }
    @keyframes music-pulse {
      0%, 100% { box-shadow: 0 0 14px rgba(200,161,74,0.2); }
      50%       { box-shadow: 0 0 28px rgba(200,161,74,0.5); }
    }

    /* ── back link ── */
    .back-link {
      position: fixed; top: 24px; left: 24px; z-index: 20;
      font-family: var(--display); font-size: 9px;
      letter-spacing: 0.4em; text-transform: uppercase;
      color: var(--muted); text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.3s, border-color 0.3s;
    }
    .back-link:hover { color: var(--gold); border-color: var(--gold-dim); }

    @media (max-width: 600px) {
      .arrow { display: none; }
      .intro-title { font-size: clamp(22px, 7vw, 40px); }
    }
  </style>
</head>
<body>

  <div class="embers" aria-hidden="true">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span>
  </div>
  <div class="vignette" aria-hidden="true"></div>

  <!-- Intro title card -->
  <div id="intro">
    <p class="intro-eyebrow">Stanford · Senior Assassins 2026</p>
    <h1 class="intro-title">A Tribute to the Greatest<br>to Play This Game</h1>
    <p class="intro-sub">An immortal. A legend. A menace.</p>
    <p class="intro-cta">Click anywhere to begin</p>
  </div>

  <!-- Slideshow -->
  <div id="slideshow"></div>
  <div id="dots"></div>

  <button class="arrow arrow-prev" id="prev" aria-label="Previous">&#8592;</button>
  <button class="arrow arrow-next" id="next" aria-label="Next">&#8594;</button>

  <audio id="bg-music" loop preload="none">
    <source src="audio/angel.mp3" type="audio/mpeg" />
  </audio>

  <button class="music-btn" id="music-btn" aria-label="Toggle music">♫</button>

  <a class="back-link" href="index.html">&#8592; The Fallen</a>

  <script>
    // ── slide data — drop photos into pics/me/ and list them here ──
    // Caption fields: name (big) + line (italic subtitle)
    const SLIDES = [
      { src: "pics/me/1.jpg",  name: "Chehan",  line: "The greatest to ever do it" },
      { src: "pics/me/2.jpg",  name: "Chehan",  line: "1 kill · 1 death · a legend nonetheless" },
      { src: "pics/me/3.jpg",  name: "Chehan",  line: "A natural born assassin" },
      { src: "pics/me/4.jpg",  name: "Chehan",  line: "Has never been caught" },
      { src: "pics/me/5.jpg",  name: "Chehan",  line: "Feared by many. Stopped by none." },
      { src: "pics/me/6.jpg",  name: "Chehan",  line: "In loving memory of his victims" },
    ];

    // ── build slides ───────────────────────────────────────────────
    const show  = document.getElementById('slideshow');
    const dotsEl = document.getElementById('dots');
    let current = 0;
    let timer   = null;

    SLIDES.forEach((s, i) => {
      const article = document.createElement('div');
      article.className = 'slide' + (i === 0 ? ' active' : '');
      article.innerHTML = `
        <img class="slide-img" src="${s.src}" alt="${s.name}" loading="${i === 0 ? 'eager' : 'lazy'}" />
        <div class="slide-caption">
          <p class="caption-name">${s.name}</p>
          <p class="caption-line">${s.line}</p>
        </div>`;
      show.appendChild(article);

      const dot = document.createElement('button');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.setAttribute('aria-label', `Go to slide ${i + 1}`);
      dot.addEventListener('click', () => goTo(i));
      dotsEl.appendChild(dot);
    });

    const slides = show.querySelectorAll('.slide');
    const dots   = dotsEl.querySelectorAll('.dot');

    function goTo(n) {
      slides[current].classList.remove('active');
      dots[current].classList.remove('active');
      current = (n + SLIDES.length) % SLIDES.length;
      slides[current].classList.add('active');
      dots[current].classList.add('active');
      resetTimer();
    }

    function resetTimer() {
      clearInterval(timer);
      timer = setInterval(() => goTo(current + 1), 6000);
    }

    document.getElementById('prev').addEventListener('click', () => goTo(current - 1));
    document.getElementById('next').addEventListener('click', () => goTo(current + 1));

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') goTo(current + 1);
      if (e.key === 'ArrowLeft')  goTo(current - 1);
    });

    // swipe support
    let touchX = null;
    document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
    document.addEventListener('touchend',   e => {
      if (touchX === null) return;
      const dx = e.changedTouches[0].clientX - touchX;
      if (Math.abs(dx) > 40) goTo(current + (dx < 0 ? 1 : -1));
      touchX = null;
    });

    // ── music ──────────────────────────────────────────────────────
    const music    = document.getElementById('bg-music');
    const musicBtn = document.getElementById('music-btn');
    let musicStarted = false;

    function startMusic() {
      if (musicStarted) return;
      musicStarted = true;
      music.currentTime = 60;
      music.volume = 0.55;
      music.play().catch(() => {});
      musicBtn.classList.add('playing');
    }

    // start on first interaction anywhere on the page
    ['click', 'keydown', 'touchstart'].forEach(evt =>
      document.addEventListener(evt, function onFirst() {
        startMusic();
        document.removeEventListener(evt, onFirst);
      }, { once: true })
    );

    musicBtn.addEventListener('click', () => {
      if (!musicStarted) { startMusic(); return; }
      if (music.paused) {
        music.play().catch(() => {});
        musicBtn.classList.add('playing');
      } else {
        music.pause();
        musicBtn.classList.remove('playing');
      }
    });

    // ── intro dismiss ──────────────────────────────────────────────
    const intro = document.getElementById('intro');
    intro.addEventListener('click', () => {
      intro.classList.add('fade-out');
      startMusic();
      resetTimer();
      setTimeout(() => intro.style.display = 'none', 1400);
    });
  </script>
</body>
</html>
